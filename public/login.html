<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Remote Claude — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --border: #3a3a3a;
      --text: #e8e8e8;
      --text-dim: #888;
      --accent: #d4a574;
      --error: #e85555;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
    }

    .login-box {
      background: var(--surface);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
    }

    .login-box h1 {
      font-size: 20px;
      margin-bottom: 24px;
      text-align: center;
    }

    .login-box input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 16px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
    }

    .login-box input:focus {
      border-color: var(--accent);
    }

    .login-box input::placeholder {
      color: var(--text-dim);
    }

    .login-box button {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #1a1a1a;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .login-box button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      color: var(--error);
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>Remote Claude</h1>
      <div class="error-msg" id="error">Invalid token</div>
      <input type="password" id="token-input" placeholder="Enter auth token" autocomplete="off">
      <button id="login-btn">Login</button>
    </div>
  </div>

  <script>
    const input = document.getElementById("token-input");
    const btn = document.getElementById("login-btn");
    const error = document.getElementById("error");

    async function login() {
      const token = input.value.trim();
      if (!token) return;

      btn.disabled = true;
      error.style.display = "none";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });

        if (res.ok) {
          window.location.href = "/";
        } else {
          error.style.display = "block";
          btn.disabled = false;
        }
      } catch {
        error.textContent = "Connection failed";
        error.style.display = "block";
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", login);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    input.focus();
  </script>
</body>
</html>
