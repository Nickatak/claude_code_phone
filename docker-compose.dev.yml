# Local development infrastructure: just Postgres.
#
# The app itself runs on the host via `npm run dev` (tsx watch) for
# fast iteration. Bring up the DB with `make db-up` and point your
# local .env DATABASE_URL at localhost:5432.
#
# This file is intentionally separate from docker-compose.yml (the prod
# stack). They never merge - each is `up`/`down` independently.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev
      - POSTGRES_DB=pocket_claude_dev
    volumes:
      - pocket_claude_dev_pgdata:/var/lib/postgresql/data

volumes:
  pocket_claude_dev_pgdata:
