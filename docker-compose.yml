services:
  remote-claude:
    build: .
    restart: unless-stopped
    ports:
      - "9800:9800"
    volumes:
      - /home/nick/learning/social_media:/home/nick/learning/social_media
      - /home/nick/.claude:/home/nick/.claude
      - ./config:/app/config:ro
    environment:
      - HOME=/home/nick
      - NODE_ENV=production
      - DB_PATH=/app/data/remote-claude.db
      - DEFAULT_CWD=/home/nick/learning/social_media
