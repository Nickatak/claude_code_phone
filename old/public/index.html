<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Remote Claude</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="header">
      <div class="header-left">
        <button class="header-btn" id="menu-btn" title="Conversations">☰</button>
        <h1>Remote Claude</h1>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="new-chat-btn">New</button>
        <span id="status-badge" class="offline">offline</span>
      </div>
    </div>

    <div id="offline-overlay" class="visible">
      <div class="offline-icon">⚡</div>
      <p>PC is offline</p>
    </div>

    <div id="chat-container" style="display:none;">
      <div id="messages"></div>
      <div id="input-area">
        <textarea id="input" rows="1" placeholder="Message Claude..." autocomplete="off"></textarea>
        <button id="send-btn" disabled>↑</button>
      </div>
    </div>

    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Conversations</h2>
        <button class="sidebar-close" id="sidebar-close">✕</button>
      </div>
      <div id="conversation-list"></div>
    </div>

    <div id="new-chat-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Select project</h2>
          <button class="sidebar-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body" id="dir-list"></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
