<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>Remote Claude</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div id="header">
      <div class="header-left">
        <button class="header-btn" id="sidebar-btn" aria-label="Conversations">&#9776;</button>
        <h1 id="header-title">~</h1>
      </div>
      <button id="new-chat-btn">New Chat</button>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Conversations</h2>
        <button class="sidebar-close" id="sidebar-close-btn">&times;</button>
      </div>
      <div id="conversation-list"></div>
    </div>

    <!-- Chat -->
    <div id="chat-container">
      <div id="messages"></div>
    </div>

    <!-- Input -->
    <div id="input-area">
      <textarea id="prompt-input" placeholder="Send a message..." rows="1"></textarea>
      <button id="send-btn" aria-label="Send">&#9650;</button>
      <button id="stop-btn" aria-label="Stop">&#9632;</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
