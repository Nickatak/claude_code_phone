services:
  pocket-claude:
    build: .
    restart: unless-stopped
    ports:
      - "9800:9800"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/nick/learning/social_media:/home/nick/learning/social_media
      - /home/nick/.claude:/home/nick/.claude
      - /home/nick/.claude.json:/home/nick/.claude.json
      - ./config:/app/config:ro
    env_file:
      - .env
    environment:
      - HOME=/home/nick
      - NODE_ENV=production
      - DEFAULT_CWD=/home/nick/learning/social_media
