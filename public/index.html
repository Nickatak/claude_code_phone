<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Remote Claude</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface-alt: #2e2e2e;
      --border: #3a3a3a;
      --text: #e8e8e8;
      --text-dim: #888;
      --accent: #d4a574;
      --accent-dim: #a07a50;
      --error: #e85555;
      --success: #5ab87a;
      --tool-bg: #1e2a1e;
      --tool-border: #2a3f2a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* --- Header --- */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    #status-badge {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 500;
    }

    #status-badge.online {
      background: rgba(90, 184, 122, 0.15);
      color: var(--success);
    }

    #status-badge.offline {
      background: rgba(232, 85, 85, 0.15);
      color: var(--error);
    }

    /* --- Sidebar (conversation list) --- */
    #sidebar {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: var(--bg);
      flex-direction: column;
    }

    #sidebar.open { display: flex; }

    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    #sidebar-header h2 { font-size: 16px; font-weight: 600; }

    .sidebar-close {
      background: none;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
    }

    #conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conv-item {
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      color: var(--text);
    }

    .conv-item:hover, .conv-item.active {
      background: var(--surface-alt);
    }

    .conv-item .conv-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-item .conv-time {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* --- Offline overlay --- */
    #offline-overlay {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--text-dim);
    }

    #offline-overlay.visible {
      display: flex;
    }

    #offline-overlay .offline-icon {
      font-size: 48px;
      opacity: 0.4;
    }

    #offline-overlay p {
      font-size: 16px;
    }

    /* --- Chat area --- */
    #chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      max-width: 90%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 15px;
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent-dim);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--surface);
      border-bottom-left-radius: 4px;
    }


    .message.tool-call {
      align-self: flex-start;
      background: var(--tool-bg);
      border: 1px solid var(--tool-border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      max-width: 90%;
    }

    .tool-call .tool-name {
      color: var(--accent);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .tool-call .tool-content {
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 150px;
      overflow-y: auto;
    }

    .streaming-cursor::after {
      content: "▊";
      animation: blink 1s step-end infinite;
      color: var(--accent);
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* --- Input area --- */
    #input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #input-area textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      outline: none;
      overflow-y: hidden;
    }

    #input-area textarea:focus {
      border-color: var(--accent-dim);
    }

    #input-area textarea::placeholder {
      color: var(--text-dim);
    }

    #send-btn {
      align-self: flex-end;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #1a1a1a;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* --- Nav buttons in header --- */
    .header-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #new-chat-btn {
      font-size: 14px;
      padding: 4px 12px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
    }

    /* --- New chat modal --- */
    #new-chat-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #new-chat-modal.open { display: flex; }

    .modal-content {
      background: var(--surface);
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 { font-size: 16px; font-weight: 600; }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .dir-item {
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dir-item:hover { background: var(--surface-alt); }

    .dir-item .dir-name {
      font-size: 14px;
      font-weight: 500;
    }

    .dir-item .dir-path {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .dir-item .dir-badge {
      font-size: 10px;
      background: var(--accent-dim);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div class="header-left">
        <button class="header-btn" id="menu-btn" title="Conversations">☰</button>
        <h1>Remote Claude</h1>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="new-chat-btn">New</button>
        <span id="status-badge" class="offline">offline</span>
      </div>
    </div>

    <div id="offline-overlay" class="visible">
      <div class="offline-icon">⚡</div>
      <p>PC is offline</p>
    </div>

    <div id="chat-container" style="display:none;">
      <div id="messages"></div>
      <div id="input-area">
        <textarea id="input" rows="1" placeholder="Message Claude..." autocomplete="off"></textarea>
        <button id="send-btn" disabled>↑</button>
      </div>
    </div>

    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Conversations</h2>
        <button class="sidebar-close" id="sidebar-close">✕</button>
      </div>
      <div id="conversation-list"></div>
    </div>

    <div id="new-chat-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Select project</h2>
          <button class="sidebar-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body" id="dir-list"></div>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    let ws = null;
    let workerOnline = false;
    let currentConversationId = null;
    let currentCwd = null;
    let directories = [];
    let userRole = localStorage.getItem("rc_role") || "chat";
    let isStreaming = false;
    let currentAssistantEl = null;
    let currentToolEls = {};

    // --- Elements ---
    const $ = (sel) => document.querySelector(sel);
    const offlineOverlay = $("#offline-overlay");
    const chatContainer = $("#chat-container");
    const messagesEl = $("#messages");
    const inputEl = $("#input");
    const sendBtn = $("#send-btn");
    const statusBadge = $("#status-badge");
    const menuBtn = $("#menu-btn");
    const sidebar = $("#sidebar");
    const sidebarClose = $("#sidebar-close");
    const convList = $("#conversation-list");
    const newChatBtn = $("#new-chat-btn");
    const newChatModal = $("#new-chat-modal");
    const modalClose = $("#modal-close");
    const dirList = $("#dir-list");

    // --- WebSocket ---
    function connectWs() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${proto}//${location.host}/ws/client`);

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleMessage(msg);
      };

      ws.onclose = () => {
        setTimeout(connectWs, 3000);
      };

      ws.onerror = () => {};
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case "status":
          if (msg.directories) directories = msg.directories;
          setWorkerStatus(msg.workerOnline);
          break;
        case "conversation_created":
          currentConversationId = msg.conversationId;
          break;
        case "stream_event":
          handleStreamEvent(msg.event);
          break;
        case "result":
          finalizeResponse(msg);
          break;
        case "error":
          showError(msg.message);
          break;
      }
    }

    function setWorkerStatus(online) {
      workerOnline = online;
      statusBadge.textContent = online ? "online" : "offline";
      statusBadge.className = online ? "online" : "offline";

      if (online) {
        offlineOverlay.classList.remove("visible");
        chatContainer.style.display = "flex";
        updateSendBtn();
      } else {
        offlineOverlay.classList.add("visible");
        chatContainer.style.display = "none";
      }
    }

    // --- Streaming ---
    function ensureAssistantBubble() {
      if (!currentAssistantEl) {
        currentAssistantEl = document.createElement("div");
        currentAssistantEl.className = "message assistant";
        currentAssistantEl.style.display = "none";
        messagesEl.appendChild(currentAssistantEl);
      }
      return currentAssistantEl;
    }

    // Close current text bubble so the next text starts fresh
    function finalizeCurrentBubble() {
      if (currentAssistantEl) {
        currentAssistantEl.classList.remove("streaming-cursor");
        if (!currentAssistantEl.textContent.trim()) {
          currentAssistantEl.remove();
        }
        currentAssistantEl = null;
      }
    }

    function parseToolInput(raw) {
      try {
        const parsed = JSON.parse(raw);
        // Show the most useful field depending on tool type
        if (parsed.command) return parsed.command;
        if (parsed.file_path) return parsed.file_path;
        if (parsed.pattern) return parsed.pattern;
        if (parsed.query) return parsed.query;
        if (parsed.content) return parsed.content.slice(0, 200) + (parsed.content.length > 200 ? "..." : "");
        return raw;
      } catch {
        return raw;
      }
    }

    function handleStreamEvent(event) {
      isStreaming = true;
      updateSendBtn();

      switch (event.type) {
        case "text_delta": {
          const bubble = ensureAssistantBubble();
          if (bubble.style.display === "none") {
            bubble.style.display = "";
            bubble.classList.add("streaming-cursor");
          }
          bubble.textContent += event.text;
          scrollToBottom();
          break;
        }
        case "tool_start": {
          // Close any current text bubble
          finalizeCurrentBubble();

          // Create tool call as its own message
          const toolDiv = document.createElement("div");
          toolDiv.className = "message tool-call";
          toolDiv.innerHTML = `<div class="tool-name">${escapeHtml(event.toolName)}</div><div class="tool-content"></div>`;
          messagesEl.appendChild(toolDiv);
          currentToolEls[event.toolId] = toolDiv;
          scrollToBottom();
          break;
        }
        case "tool_input": {
          const toolDiv = currentToolEls[event.toolId];
          if (toolDiv) {
            const content = toolDiv.querySelector(".tool-content");
            content.textContent += event.partialInput;
            scrollToBottom();
          }
          break;
        }
        case "tool_result": {
          const toolDiv = currentToolEls[event.toolId];
          if (toolDiv) {
            // Parse the accumulated input for nicer display
            const content = toolDiv.querySelector(".tool-content");
            content.textContent = parseToolInput(content.textContent);
          }
          // Next text will start a new bubble
          scrollToBottom();
          break;
        }
      }
    }

    function finalizeResponse(msg) {
      isStreaming = false;

      // If we have fullText but the bubble is empty or hidden, render it
      if (msg.fullText) {
        const bubble = ensureAssistantBubble();
        if (!bubble.textContent.trim()) {
          bubble.textContent = msg.fullText;
        }
        bubble.style.display = "";
      }

      finalizeCurrentBubble();
      currentToolEls = {};
      updateSendBtn();
    }

    function showError(message) {
      isStreaming = false;
      const el = document.createElement("div");
      el.className = "message assistant";
      el.style.borderLeft = `3px solid var(--error)`;
      el.textContent = `Error: ${message}`;
      messagesEl.appendChild(el);
      currentAssistantEl = null;
      currentToolEls = {};
      updateSendBtn();
      scrollToBottom();
    }

    // --- Sending ---
    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !workerOnline || isStreaming) return;

      // Show user message
      const userEl = document.createElement("div");
      userEl.className = "message user";
      userEl.textContent = text;
      messagesEl.appendChild(userEl);

      // Send to relay
      const payload = {
        type: "send",
        conversationId: currentConversationId,
        message: text,
      };
      if (!currentConversationId && currentCwd) {
        payload.cwd = currentCwd;
      }
      ws.send(JSON.stringify(payload));

      inputEl.value = "";
      autoResize();
      updateSendBtn();
      scrollToBottom();
    }

    // --- Conversations ---
    async function loadConversations() {
      try {
        const res = await fetch("/api/conversations");
        const convs = await res.json();
        convList.innerHTML = "";
        for (const conv of convs) {
          const el = document.createElement("div");
          el.className = "conv-item" + (conv.id === currentConversationId ? " active" : "");
          el.innerHTML = `
            <div class="conv-title">${escapeHtml(conv.title || "Untitled")}</div>
            <div class="conv-time">${formatTime(conv.updatedAt)}</div>
          `;
          el.onclick = () => openConversation(conv.id);
          convList.appendChild(el);
        }
      } catch {}
    }

    async function openConversation(id) {
      currentConversationId = id;
      messagesEl.innerHTML = "";
      sidebar.classList.remove("open");

      try {
        const res = await fetch(`/api/conversations/${id}/messages`);
        const msgs = await res.json();
        for (const msg of msgs) {
          const el = document.createElement("div");
          el.className = `message ${msg.role}`;
          el.textContent = msg.content;
          messagesEl.appendChild(el);
        }
        scrollToBottom();
      } catch {}
    }

    function startNewChat() {
      sidebar.classList.remove("open");

      if (userRole === "admin" && directories.length > 0) {
        showDirPicker();
      } else {
        currentConversationId = null;
        currentCwd = null;
        messagesEl.innerHTML = "";
      }
    }

    function showDirPicker() {
      dirList.innerHTML = "";
      for (const dir of directories) {
        const el = document.createElement("div");
        el.className = "dir-item";
        el.innerHTML = `
          <div style="flex:1">
            <div class="dir-name">${escapeHtml(dir.name)}</div>
            <div class="dir-path">${escapeHtml(dir.path)}</div>
          </div>
          ${dir.hasClaudeMd ? '<span class="dir-badge">CLAUDE.md</span>' : ""}
        `;
        el.onclick = () => selectDir(dir.path);
        dirList.appendChild(el);
      }
      newChatModal.classList.add("open");
    }

    function selectDir(dirPath) {
      currentConversationId = null;
      currentCwd = dirPath;
      messagesEl.innerHTML = "";
      newChatModal.classList.remove("open");
    }

    // --- UI helpers ---
    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function updateSendBtn() {
      sendBtn.disabled = !workerOnline || isStreaming || !inputEl.value.trim();
    }

    function autoResize() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function formatTime(iso) {
      if (!iso) return "";
      const d = new Date(iso + "Z");
      const now = new Date();
      if (d.toDateString() === now.toDateString()) {
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }
      return d.toLocaleDateString([], { month: "short", day: "numeric" });
    }

    // --- Event listeners ---
    sendBtn.addEventListener("click", sendMessage);

    inputEl.addEventListener("input", () => {
      autoResize();
      updateSendBtn();
    });

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    menuBtn.addEventListener("click", () => {
      sidebar.classList.add("open");
      loadConversations();
    });

    sidebarClose.addEventListener("click", () => {
      sidebar.classList.remove("open");
    });

    newChatBtn.addEventListener("click", startNewChat);

    modalClose.addEventListener("click", () => {
      newChatModal.classList.remove("open");
    });

    // Close modal on backdrop click
    newChatModal.addEventListener("click", (e) => {
      if (e.target === newChatModal) newChatModal.classList.remove("open");
    });

    // --- Init ---
    connectWs();
  </script>
</body>
</html>
